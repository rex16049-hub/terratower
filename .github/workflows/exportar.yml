name: "Compilar APK en la Nube"
on:
  push:
    branches: [ main, master ]

jobs:
  export-android:
    name: Compilar APK de Godot
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: Compilar App Nativa APK
        uses: firebelley/godot-export@v5.2.0
        with:
          godot_executable_download_url: https://github.com
          godot_export_templates_download_url: https://github.com
          relative_project_path: ./
          archive_output: true
